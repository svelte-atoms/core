name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, lifecycle, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Unit tests
        run: bun run test:unit -- --run

      - name: E2E tests
        run: bun run test:e2e

      - name: Component lifecycle audit
        run: bun run audit:components

      - name: Bond runtime audit
        run: bun run audit:bond-runtime

      - name: Build
        run: bun run build

      - name: Package exports
        run: bun run test:exports

      - name: Packed documentation examples
        run: bun run verify:packed-docs

      - name: Storybook build
        run: bun run storybook:build
